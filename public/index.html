<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="base:app_id" content="69f6736de5227b2ca7cbabad" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake on Base</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

  <style>
    body {
      font-family: system-ui;
    }

    canvas {
      image-rendering: pixelated;
      background: #052e16;
      border: 3px solid #22c55e;
      width: 100%;
      max-width: 420px;
      touch-action: none;
    }

    /* MODAL */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    .modal-box {
      background: #0f172a;
      padding: 20px;
      border-radius: 16px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      animation: pop 0.2s ease;
      position: relative;
    }

    @keyframes pop {
      from {
        transform: scale(0.85);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .card {
      background: #1f2937;
      padding: 10px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
    }

    /* close button */
    .closeBtn {
      position: absolute;
      top: 10px;
      right: 12px;
      cursor: pointer;
      font-size: 18px;
      color: white;
    }

    .closeBtn:hover {
      color: red;
    }
  </style>
</head>

<body class="bg-gray-950 text-white flex flex-col items-center p-4">

  <h1 class="text-3xl md:text-5xl text-green-400 mb-3">🐍 Snake on Base</h1>

  <canvas id="canvas" width="600" height="600" tabindex="0"></canvas>

  <div class="mt-3 text-lg">
    Score: <span id="score">0</span> |
    High: <span id="highscore">0</span>
  </div>

  <!-- Controls -->
  <div class="grid grid-cols-3 gap-2 mt-4 md:hidden">
    <div></div>
    <button onclick="setDir('up')" class="bg-green-700 p-3 rounded">↑</button>
    <div></div>

    <button onclick="setDir('left')" class="bg-green-700 p-3 rounded">←</button>
    <div></div>
    <button onclick="setDir('right')" class="bg-green-700 p-3 rounded">→</button>

    <div></div>
    <button onclick="setDir('down')" class="bg-green-700 p-3 rounded">↓</button>
  </div>

  <!-- buttons -->
  <div class="mt-5 flex gap-3">
    <button id="connectBtn" class="bg-blue-600 px-4 py-2 rounded">Connect</button>
    <button id="disconnectBtn" class="bg-red-600 px-4 py-2 rounded hidden">Disconnect</button>
    <button id="startBtn" class="bg-green-500 px-4 py-2 rounded">Start Game</button>
  </div>

  <div id="walletInfo" class="mt-2 text-sm text-gray-400"></div>

  <h2 class="mt-6 text-yellow-400 text-xl">🏆 Leaderboard</h2>
  <div id="leaderboard" class="w-full max-w-sm space-y-2 mt-2"></div>

  <!-- MODAL -->
  <div id="modal" class="modal">
    <div class="modal-box">

      <div class="closeBtn" onclick="closeModal()">✖</div>

      <h2 id="mTitle" class="text-xl font-bold mb-2"></h2>
      <p id="mText" class="mb-4"></p>
      <div id="mBtns"></div>

    </div>
  </div>

  <script>

    const CONTRACT = "0x80014Ea8b2B3A13B44C210Ecbbec0A1CFE547F67";

    const ABI = [
      "function updateScore(uint256)",
      "function getTopPlayers() view returns (tuple(address player,uint256 score)[])",
      "function getMyHighScore(address) view returns (uint256)"
    ];

    let provider, signer, account, contract;
    let gameRunning = false;

    /* ---------- MODAL ---------- */
    function showModal(title, text, buttons = []) {
      modal.style.display = "flex";
      mTitle.innerText = title;
      mText.innerText = text;
      mBtns.innerHTML = "";

      buttons.forEach(b => {
        let btn = document.createElement("button");
        btn.innerText = b.text;
        btn.className = "bg-green-500 px-4 py-2 rounded m-1";
        btn.onclick = b.onClick;
        mBtns.appendChild(btn);
      });
    }

    function closeModal() {
      modal.style.display = "none";
    }

    /* ---------- WALLET ---------- */
    async function connectWallet() {
      await ethereum.request({ method: "eth_requestAccounts" });

      await ethereum.request({
        method: "wallet_switchEthereumChain",
        params: [{ chainId: "0x2105" }]
      });

      provider = new ethers.providers.Web3Provider(window.ethereum);
      signer = provider.getSigner();
      account = await signer.getAddress();

      contract = new ethers.Contract(CONTRACT, ABI, signer);

      walletInfo.innerText = "Connected: " + account.slice(0, 6) + "...";

      connectBtn.classList.add("hidden");
      disconnectBtn.classList.remove("hidden");

      loadHighScore();
      loadLeaderboard();
    }

    function disconnectWallet() {
      account = null;
      contract = null;

      connectBtn.classList.remove("hidden");
      disconnectBtn.classList.add("hidden");
      walletInfo.innerText = "";
    }

    /* ---------- BLOCKCHAIN ---------- */
    async function loadHighScore() {
      if (!contract) return;
      let hs = await contract.getMyHighScore(account);
      highscore.innerText = hs.toString();
    }

    async function loadLeaderboard() {
      if (!contract) return;

      let data = await contract.getTopPlayers();
      leaderboard.innerHTML = "";

      data.forEach((p, i) => {
        let div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
      <span>${i + 1}. ${p.player.slice(0, 6)}...</span>
      <span class="text-yellow-400">${p.score}</span>
    `;
        leaderboard.appendChild(div);
      });
    }

    /* ---------- SAVE ---------- */
    async function saveScore(score) {
      try {
        let tx = await contract.updateScore(score);
        await tx.wait();

        showModal("Saved ✅", "Score saved to Base");
        loadLeaderboard();
        loadHighScore();
      } catch (e) {
        showModal("Error ❌", e.message);
      }
    }

    /* ---------- GAME ---------- */
    let c = canvas.getContext("2d");
    let snake, food;
    let dx = 1, dy = 0, nextDx = 1, nextDy = 0;
    let grid = 30, size = 20;
    let run;

    function reset() {
      snake = [{ x: 10, y: 10 }];
      dx = 1; dy = 0;
      score.innerText = 0;
      food = { x: 5, y: 5 };
    }

    function draw() {
      c.fillStyle = "#052e16";
      c.fillRect(0, 0, 600, 600);

      c.fillStyle = "#22c55e";
      snake.forEach(s => c.fillRect(s.x * size, s.y * size, size - 2, size - 2));

      c.fillStyle = "yellow";
      c.fillRect(food.x * size, food.y * size, size - 2, size - 2);
    }

    function move() {
      dx = nextDx; dy = nextDy;

      let h = { x: snake[0].x + dx, y: snake[0].y + dy };

      if (h.x < 0 || h.y < 0 || h.x >= grid || h.y >= grid || snake.some(s => s.x === h.x && s.y === h.y)) {
        gameOver();
        return;
      }

      snake.unshift(h);

      if (h.x === food.x && h.y === food.y) {
        score.innerText = snake.length - 1;
        food = { x: Math.random() * grid | 0, y: Math.random() * grid | 0 };
      } else snake.pop();

      draw();
    }

    /* ---------- GAME OVER ---------- */
    async function gameOver() {
      clearInterval(run);
      gameRunning = false;

      let sc = snake.length - 1;

      showModal("Game Over 💀", "Score: " + sc, [
        {
          text: "💾 Save",
          onClick: async () => {
            closeModal();
            await saveScore(sc);
          }
        },
        {
          text: "❌ Skip",
          onClick: closeModal
        }
      ]);

      startBtn.disabled = false;
      startBtn.innerText = "Play Again";
    }

    /* ---------- CONTROLS ---------- */
    document.addEventListener("keydown", e => {
      if (!gameRunning) return;

      if (e.key === "ArrowUp" && dy !== 1) { nextDx = 0; nextDy = -1; }
      if (e.key === "ArrowDown" && dy !== -1) { nextDx = 0; nextDy = 1; }
      if (e.key === "ArrowLeft" && dx !== 1) { nextDx = -1; nextDy = 0; }
      if (e.key === "ArrowRight" && dx !== -1) { nextDx = 1; nextDy = 0; }
    });

    function setDir(d) {
      if (!gameRunning) return;

      if (d === "up" && dy !== 1) { nextDx = 0; nextDy = -1; }
      if (d === "down" && dy !== -1) { nextDx = 0; nextDy = 1; }
      if (d === "left" && dx !== 1) { nextDx = -1; nextDy = 0; }
      if (d === "right" && dx !== -1) { nextDx = 1; nextDy = 0; }
    }

    /* ---------- START ---------- */
    startBtn.onclick = () => {
      if (!account) return showModal("Wallet", "Connect wallet first");

      reset();
      run = setInterval(move, 100);
      draw();

      gameRunning = true;

      startBtn.disabled = true;
      startBtn.innerText = "Playing...";
    };

    connectBtn.onclick = connectWallet;
    disconnectBtn.onclick = disconnectWallet;

    reset();
    draw();

  </script>

</body>

</html>
